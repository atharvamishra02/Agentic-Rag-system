name: CI/CD

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        working-directory: client
        run: npm ci

      - name: Build
        working-directory: client
        run: npm run build

  backend:
    name: Backend CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        working-directory: server
        run: npm ci

      - name: Build
        working-directory: server
        run: npm run build

  python:
    name: Python CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Syntax check
        run: python -m compileall -q agents api core observability server *.py

  deploy:
    name: Deploy to agenticrag.online
    runs-on: ubuntu-latest
    needs: [frontend, backend, python]
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          REPO_URL: https://github.com/${{ github.repository }}.git
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          envs: DEPLOY_PATH,REPO_URL
          script: |
            set -Eeuo pipefail
            echo "=== Deploying Agentic RAG System ==="

            if [ -z "$DEPLOY_PATH" ]; then
              echo "DEPLOY_PATH secret is empty."
              exit 1
            fi

            if [ ! -d "$DEPLOY_PATH/.git" ]; then
              if [ -d "$DEPLOY_PATH" ] && [ "$(find "$DEPLOY_PATH" -mindepth 1 -maxdepth 1 | wc -l)" -gt 0 ]; then
                echo "DEPLOY_PATH exists but is not a Git repository: $DEPLOY_PATH"
                echo "Set DEPLOY_PATH to the existing repo checkout, or move/empty this directory so it can be cloned."
                exit 1
              fi

              echo "Cloning repository into $DEPLOY_PATH..."
              mkdir -p "$DEPLOY_PATH"
              git clone "$REPO_URL" "$DEPLOY_PATH"
            fi

            cd "$DEPLOY_PATH"

            # Pull latest code
            echo "Pulling latest code..."
            git pull --ff-only origin main

            # Rebuild and restart containers
            echo "Rebuilding Docker containers..."
            docker compose -p agentic-rag -f deployment/docker-compose.yml build --no-cache
            docker compose -p agentic-rag -f deployment/docker-compose.yml up -d --force-recreate

            # Wait for services to start
            echo "Waiting for services to start..."
            sleep 10

            # Health check
            echo "Running health check..."
            curl -f http://localhost:5001/health || echo "WARNING: Health check failed"

            echo "=== Deployment complete! ==="
