name: CI/CD

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        working-directory: client
        run: npm ci

      - name: Build
        working-directory: client
        run: npm run build

  backend:
    name: Backend CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        working-directory: server
        run: npm ci

      - name: Build
        working-directory: server
        run: npm run build

  python:
    name: Python CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Syntax check
        run: python -m compileall -q agents core memory *.py

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: [frontend, backend, python]
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          DEPLOY_PATH: /root/agentic-rag-system
          REPO_URL: https://github.com/${{ github.repository }}.git
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          envs: DEPLOY_PATH,REPO_URL
          script: |
            set -Eeuo pipefail
            echo "=== Deploying Agentic RAG System ==="

            if [ -z "$DEPLOY_PATH" ]; then
              echo "DEPLOY_PATH secret is empty."
              exit 1
            fi

            if [ ! -d "$DEPLOY_PATH/.git" ]; then
              if [ -d "$DEPLOY_PATH" ] && [ "$(find "$DEPLOY_PATH" -mindepth 1 -maxdepth 1 | wc -l)" -gt 0 ]; then
                echo "DEPLOY_PATH exists but is not a Git repository: $DEPLOY_PATH"
                echo "Set DEPLOY_PATH to the existing repo checkout, or move/empty this directory so it can be cloned."
                exit 1
              fi

              echo "Cloning repository into $DEPLOY_PATH..."
              mkdir -p "$DEPLOY_PATH"
              git clone "$REPO_URL" "$DEPLOY_PATH"
            fi

            cd "$DEPLOY_PATH"

            # Pull latest code
            echo "Pulling latest code..."
            git fetch origin main
            git reset --hard origin/main

            # Check if .env file exists, if not create from example
            if [ ! -f ".env" ]; then
              echo "⚠️  WARNING: .env file not found!"
              if [ -f ".env.example" ]; then
                echo "Creating .env from .env.example template..."
                cp .env.example .env
                echo "✓ .env file created. Please update the following in the .env file:"
                echo "  - GOOGLE_API_KEY (required)"
                echo "  - GOOGLE_CLIENT_ID, GOOGLE_CLIENT_SECRET (for Google OAuth)"
                echo "  - GITHUB_CLIENT_ID, GITHUB_CLIENT_SECRET (for GitHub OAuth)"
                echo "  - DATABASE_URL (if using custom PostgreSQL)"
                echo ""
                echo "Update .env, then re-run the deployment or manually restart containers:"
                echo "  cd '$DEPLOY_PATH' && docker compose -p agentic-rag -f deployment/docker-compose.yml up -d --force-recreate"
                echo ""
                exit 1
              else
                echo "ERROR: Neither .env nor .env.example found"
                exit 1
              fi
            fi

            # Enable Docker BuildKit for better layer caching and performance
            export DOCKER_BUILDKIT=1
            export COMPOSE_DOCKER_CLI_BUILD=1

            # Aggressive disk cleanup
            echo "Cleaning up disk space..."
            docker system prune -f --volumes || true
            docker image prune -f -a || true
            docker builder prune -f -a || true
            
            # Optional: Find and remove large files in old containers/volumes
            df -h
            echo "Free space after cleanup:"

            # Rebuild and restart containers with retries
            echo "Rebuilding Docker containers (with retry)..."
            RETRY_COUNT=0
            MAX_RETRIES=2
            
            while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
              if docker compose -p agentic-rag -f deployment/docker-compose.yml build --progress=plain; then
                echo "Docker build succeeded"
                break
              else
                RETRY_COUNT=$((RETRY_COUNT + 1))
                if [ $RETRY_COUNT -lt $MAX_RETRIES ]; then
                  echo "Build failed, retry $RETRY_COUNT/$MAX_RETRIES after cleanup..."
                  docker system prune -f --volumes || true
                  docker builder prune -f -a || true
                  sleep 5
                else
                  echo "Build failed after $MAX_RETRIES retries"
                  exit 1
                fi
              fi
            done

            # Bring up containers
            echo "Starting containers..."
            docker compose -p agentic-rag -f deployment/docker-compose.yml up -d --force-recreate

            # Configure and reload Nginx
            echo "Configuring Nginx..."
            if [ -f "deployment/nginx-agentic-rag.conf" ]; then
              cp deployment/nginx-agentic-rag.conf /etc/nginx/sites-available/agentic-rag
              ln -sf /etc/nginx/sites-available/agentic-rag /etc/nginx/sites-enabled/agentic-rag
              # Test Nginx and reload if valid, otherwise do not break the script if nginx isn't running/configured yet
              if command -v nginx >/dev/null 2>&1; then
                nginx -t && systemctl reload nginx || echo "Nginx test/reload failed, please check configuration manually."
              else
                echo "Nginx command not found. Please install Nginx on the server."
              fi
            fi

            # Wait for services to start
            echo "Waiting for services to start..."
            sleep 15

            # Health check with retries
            echo "Running health check..."
            for i in {1..5}; do
              if curl -f http://localhost:5001/health 2>/dev/null; then
                echo "Health check passed!"
                break
              elif [ $i -lt 5 ]; then
                echo "Health check attempt $i/5 failed, retrying..."
                sleep 2
              else
                echo "WARNING: Health check failed after 5 attempts"
              fi
            done

            echo "=== Deployment complete! ==="! ==="
