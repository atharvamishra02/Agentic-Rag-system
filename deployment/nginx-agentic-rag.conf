# Nginx configuration for the Agentic RAG System
# This file acts as a reverse proxy, directing traffic to the correct service.

server {
    # Listen on standard HTTP port 80 (change if there is a conflict on port 80)
    listen 80; 
    server_name agenticrag.online www.agenticrag.online;

    # Allow large file uploads (up to 100MB) for PDFs
    client_max_body_size 100M;

    # Route 1: Frontend and General API           
    # Passes traffic to the Node.js Backend
    location / {
        proxy_pass http://127.0.0.1:5001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 600;
        proxy_connect_timeout 600;
        proxy_send_timeout 600;
        client_body_timeout 600;
    }

    # Route 2: RAG Intelligence API
    # Passes specific AI/Search traffic directly to the Python RAG Engine
    location /api/rag/ {
        proxy_pass http://127.0.0.1:8001/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
