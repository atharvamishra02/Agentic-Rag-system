# Nginx configuration for the Agentic RAG System
# This file acts as a reverse proxy, directing traffic to the correct service.

server {
    # Listen on port 8081 (to avoid conflict with other apps on port 80)
    listen 8081; 
    server_name agenticrag.online;

    # Allow large file uploads (up to 100MB) for PDFs
    client_max_body_size 100M;

    # Route 1: Frontend and General API           
    # Passes traffic to the Node.js Backend
    location / {
        proxy_pass http://localhost:5001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 600;
        proxy_connect_timeout 600;
        proxy_send_timeout 600;
        client_body_timeout 600;
    }

    # Route 2: RAG Intelligence API
    # Passes specific AI/Search traffic directly to the Python RAG Engine
    location /api/rag/ {
        proxy_pass http://localhost:8001/;
        proxy_set_header Host $host;
    }
}
