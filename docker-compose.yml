version: '3.8'

services:
  api:
    build: 
      context: .
      dockerfile: Dockerfile.python
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - QDRANT_HOST=qdrant
      - REDIS_HOST=redis
      - POSTGRES_URL=postgresql://user:pass@postgres:5432/agent_memory
    depends_on:
      - qdrant
      - redis
      - postgres
    networks:
      - agent-net

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - agent-net

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    networks:
      - agent-net

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: agent_memory
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - agent-net

networks:
  agent-net:
    driver: bridge

volumes:
  qdrant_data:
  postgres_data:
